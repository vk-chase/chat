<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title></title>
  <link href="vendor/latofonts.css" rel="stylesheet">
  <link href="vendor/flexboxgrid.6.3.1.min.css" rel="stylesheet"></link>
  <link href="vendor/animate.3.5.2.min.css" rel="stylesheet"></link>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
  <link href="./css/style.css" rel="stylesheet"></link>

  <script src="vendor/vue.2.3.3.min.js" type="text/javascript"></script>
  <script src="./js/config.default.js" type="text/javascript"></script>
  <script src="./js/config.js" type="text/javascript"></script>
  <script src="https://code.jquery.com/jquery-1.12.4.js"></script>
</head>
<body>
  <div id="app"></div>

  <script type="text/x-template" id="app_template">
    <div id="app">
      <div ref="chatShell"
           class="chat-shell"
           :style="shellStyle"
           :class="{ 'hidden': shouldHide, 'is-dragging': dragging || pickerDragging }">
        <div class="chat-window" :class="{ 'fadeOutUp animated': !showWindow }">
          <div class="chat-toolbar" v-show="showInput">
            <button class="chat-toolbar-button chat-drag-handle"
                    @mousedown="startDrag">
              <i class="bi bi-arrows-move"></i>
              <span>Move chat</span>
            </button>

            <button class="chat-toolbar-button"
                    :class="{ active: showStylePanel && styleEditorTarget === 'box' }"
                    @click="openStylePanel('box')">
              <i class="bi bi-bounding-box"></i>
              <span>Box color</span>
            </button>

            <button class="chat-toolbar-button"
                    :class="{ active: showStylePanel && styleEditorTarget === 'text' }"
                    @click="openStylePanel('text')">
              <i class="bi bi-type"></i>
              <span>Text color</span>
            </button>
          </div>

          <div v-if="showInput && showStylePanel" class="chat-style-panel">
            <div class="chat-style-panel-header">
              <div>
                <strong>{{ activeStyleLabel }}</strong>
                <small>{{ activeStyleDescription }}</small>
              </div>

              <button class="chat-toolbar-button chat-style-close" @click="closeStylePanel">
                <i class="bi bi-x-lg"></i>
              </button>
            </div>

            <div class="chat-style-picker-wrap">
              <div ref="colorField"
                   class="chat-color-field"
                   :style="colorFieldStyle"
                   @mousedown.prevent="startColorFieldDrag">
                <div class="chat-color-field-cursor" :style="colorFieldCursorStyle"></div>
              </div>

              <div class="chat-style-swatch" :style="activeStyleSwatchStyle">
                <span>{{ activeStyleLabel }}</span>
                <small>{{ activeStyleHex }}</small>
              </div>
            </div>

            <div class="chat-style-slider-group">
              <div class="chat-style-slider-labels">
                <span>Hue</span>
                <span>{{ activeStyle.h }}°</span>
              </div>
              <input class="chat-slider hue"
                     type="range"
                     min="0"
                     max="360"
                     :value="activeStyle.h"
                     :style="hueSliderStyle"
                     @input="setActiveHue($event.target.value)">
            </div>

            <div class="chat-style-slider-group">
              <div class="chat-style-slider-labels">
                <span>Transparency</span>
                <span>{{ activeStyle.a }}%</span>
              </div>
              <input class="chat-slider alpha"
                     type="range"
                     min="0"
                     max="100"
                     :value="activeStyle.a"
                     :style="alphaSliderStyle"
                     @input="setActiveAlpha($event.target.value)">
            </div>

            <div class="chat-style-slider-group">
              <div class="chat-style-slider-labels">
                <span>Glow</span>
                <span>{{ activeStyle.glow }}%</span>
              </div>
              <input class="chat-slider glow"
                     type="range"
                     min="0"
                     max="100"
                     :value="activeStyle.glow"
                     :style="glowSliderStyle"
                     @input="setActiveGlow($event.target.value)">
            </div>

            <div class="chat-style-actions">
              <button class="chat-toolbar-button" @click="resetActiveStyle">
                <i class="bi bi-arrow-counterclockwise"></i>
                <span>Reset {{ styleEditorTarget }}</span>
              </button>
            </div>
          </div>

          <div class="chat-messages" ref="messages">
            <message v-for="(msg, index) in messages"
                     :templates="templates"
                     :multiline="msg.multiline"
                     :args="msg.args"
                     :color="msg.color"
                     :template="msg.template"
                     :template-id="msg.templateId"
                     :key="index">
            </message>
          </div>
        </div>

        <div class="chat-input" v-show="showInput">
          <div class="chat-holder">
            <p class="chat-pill"><i class="bi bi-chat-dots-fill"></i></p>
            <textarea v-model="message"
                      ref="input"
                      type="text"
                      autofocus
                      spellcheck="false"
                      @keyup.esc="hideInput"
                      @keyup="keyUp"
                      @keydown="keyDown"
                      @keypress.enter.prevent="send">
            </textarea>
          </div>
          <suggestions :message="message" :suggestions="suggestions"></suggestions>
        </div>
      </div>
    </div>
  </script>

  <script type="text/x-template" id="message_template">
    <div class="msg" :class="{ multiline }">
      <span v-html="textEscaped"></span>
    </div>
  </script>

  <script type="text/x-template" id="suggestions_template">
    <div class="suggestions-wrap" v-show="currentSuggestions.length > 0">
      <ul class="suggestions">
        <li class="suggestion" v-for="s in currentSuggestions">
          <p>
            <span :class="{ 'disabled': s.disabled }">
              {{s.name}}
            </span>
            <span class="param"
                  v-for="(p, index) in s.params"
                  :class="{ 'disabled': p.disabled }">
              [{{p.name}}]
            </span>
          </p>
          <small class="help">
            <template v-if="!s.disabled">
              {{s.help}}
            </template>
            <template v-for="p in s.params" v-if="!p.disabled">
              {{p.help}}
            </template>
          </small>
        </li>
      </ul>
    </div>
  </script>

  <script type="text/javascript" src="./js/Suggestions.js"></script>
  <script type="text/javascript" src="./js/Message.js"></script>
  <script type="text/javascript" src="./js/App.js"></script>

  <script type="text/javascript">
    window.post = (url, data) => {
      const request = new XMLHttpRequest();
      request.open('POST', url, true);
      request.setRequestHeader('Content-Type', 'application/json; charset=UTF-8');
      request.send(data);
    };

    new Vue({
      el: '#app',
      render: (h) => h(APP),
    });

    window.emulate = (type, detail = {}) => {
      detail.type = type;
      window.dispatchEvent(new CustomEvent('message', {
        detail,
      }));
    };
  </script>
</body>
</html>
